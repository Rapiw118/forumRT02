    <h1 class="judul">FORM LAPORAN PENGADUAN</h1>

    <div class="card-form">

        <div class="jenis-pengaduan">
            JENIS PENGADUAN
        </div>

        <div class="kategori">
            Fasilitas Umum
        </div>

        <hr>

        <div id="notif-sukses" class="alert alert-success d-none text-center fw-bold mb-4" role="alert">
            ✅ Terimakasih Atas Laporan yang anda kirim
        </div>

        <form id="form-laporan" action="proses_fasilitas_umum.php" method="POST" enctype="multipart/form-data" onsubmit="tanganiPengaduan(event)">

            <div class="mb-3">
                <label class="form-label">Tanggal Pengaduan</label>
                <input type="date" id="tanggal_pengaduan" name="tanggal_pengaduan" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Isi Pengaduan</label>
                <textarea name="isi_pengaduan" rows="4" class="form-control" required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Unggah Bukti Foto</label>
                <input type="file" name="foto" class="form-control" accept="image/*" required>
            </div>

            <button type="submit" class="btn btn-lapor">
                Buat Laporan
            </button>

        </form>

    </div>

</div>

<script>
    // Mengatur otomatis tanggal hari ini saat halaman dimuat
    document.addEventListener('DOMContentLoaded', () => {
        const hariIni = new Date().toISOString().split('T')[0];
        document.getElementById('tanggal_pengaduan').value = hariIni;
    });

    function tanganiPengaduan(event) {
        // Catatan Backend: Jika kamu ingin form ini benar-benar mengirim data ke file PHP ("proses_fasilitas_umum.php"), 
        // hapus baris "event.preventDefault()" di bawah ini.
        event.preventDefault(); 

        // 1. Munculkan pop-up alert bawaan browser sesuai request
        alert("Terimakasih Atas Laporan yang anda kirim");

        // 2. Munculkan juga Banner Alert Bootstrap berwarna hijau di atas form agar estetik
        const notif = document.getElementById('notif-sukses');
        notif.classList.remove('d-none');

        // 3. Reset isi form agar bersih kembali setelah melapor
        document.getElementById('form-laporan').reset();

        // Kembalikan tanggal ke hari ini setelah di-reset
        const hariIni = new Date().toISOString().split('T')[0];
        document.getElementById('tanggal_pengaduan').value = hariIni;

        // (Opsional) Menghilangkan kembali banner hijau setelah 5 detik
        setTimeout(() => {
            notif.classList.add('d-none');
        }, 5000);
    }
</script>
